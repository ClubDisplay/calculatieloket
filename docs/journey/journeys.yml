journeys:

  # ---------------------------------------------------------------------------
  # Journey 1: Werknemer van salaris naar toeslagen
  # ---------------------------------------------------------------------------
  - id: "salary-to-benefits"
    name: "Salaris naar toeslagen"
    primary_calculator: "bruto-netto-2026"
    entry_intent: "Een werknemer wil weten wat zijn nettoloon is en of hij recht heeft op toeslagen."
    user_question: "Wat houd ik netto over en kan ik toeslag krijgen?"
    known_inputs:
      - "bruto-maandsalaris"
      - "loonheffingskorting (aan/uit)"
      - "pensioenpremie"
    derived_outputs:
      - "netto-per-maand"
      - "belastbaar-jaarinkomen"
      - "vakantiegeld"
    reusable_data:
      - "belastbaar-jaarinkomen"
    next_calculators:
      - "toeslagen-calculator"
      - "hypotheek-calculator"
      - "bruto-netto-2026"
      - "vakantiegeld-check"
      - "pensioen-indicatie"
    official_sources:
      - name: "Belastingdienst — Box 1 tarieven"
        url: "https://www.belastingdienst.nl/wps/wcm/connect/bldcontentnl/belastingdienst/prive/inkomstenbelasting/heffingskortingen_boxen_tarieven/boxen_en_tarieven/box_1/box_1"
      - name: "Dienst Toeslagen — Huurtoeslag"
        url: "https://www.toeslagen.nl/huurtoeslag"
    warnings:
      - "Toeslagen zijn afhankelijk van vermogen en toeslagpartner — deze calculator neemt alleen inkomen mee."
      - "Deze berekening is een indicatie. Doe altijd de officiële proefberekening op Toeslagen.nl."
    conversion_opportunities:
      - "Inschakelen financieel adviseur voor belastingoptimalisatie"
      - "Inschakelen hypotheekadviseur bij koopwens"
    future_features:
      - "Vermogenstoets toevoegen aan toeslagen-calculator"
      - "Partnerinkomen optioneel meerekenen"
      - "Notificatie bij tariefwijzigingen"
    priority: "A"
    status: "documented"

  # ---------------------------------------------------------------------------
  # Journey 2: Werknemer van salaris naar hypotheek
  # ---------------------------------------------------------------------------
  - id: "salary-to-mortgage"
    name: "Salaris naar hypotheek"
    primary_calculator: "salaris-calculator"
    entry_intent: "Een werknemer wil zijn maximale hypotheek weten op basis van zijn inkomen."
    user_question: "Hoeveel hypotheek kan ik krijgen met mijn salaris?"
    known_inputs:
      - "bruto-maandsalaris"
      - "loonheffingskorting (aan/uit)"
      - "pensioenpremie-percentage"
    derived_outputs:
      - "bruto-jaarsalaris"
      - "netto-per-maand"
    reusable_data:
      - "bruto-jaarsalaris"
    next_calculators:
      - "hypotheek-calculator"
      - "bruto-netto-2026"
      - "overdrachtsbelasting"
      - "eigen-geld-nodig"
    official_sources:
      - name: "Nibud — Budgetvoorlichting"
        url: "https://www.nibud.nl"
      - name: "Rijksoverheid — Hypotheek"
        url: "https://www.rijksoverheid.nl/hypotheek"
    warnings:
      - "Dit is een indicatie, geen officiële hypotheekofferte."
      - "Banken hanteren eigen acceptatieregels (studieschuld, BKR, gezinssituatie)."
    conversion_opportunities:
      - "Inschakelen hypotheekadviseur"
      - "Oriënteren op NHG-voorwaarden"
    future_features:
      - "Studieschuld-input toevoegen aan hypotheek-calculator"
      - "BKR-check niet mogelijk — verwijzing naar officieel loket"
    priority: "A"
    status: "documented"

