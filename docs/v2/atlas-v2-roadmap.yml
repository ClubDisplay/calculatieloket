## Succescriteria

- Alle v1 calculators draaien op Atlas v2-engine zonder output-afwijking.
- Nieuwe calculators kunnen worden toegevoegd via YAML-definities.
- Multi-locale support is technisch mogelijk.
- Build levert 15+ pagina's op zonder errors.
- Documentatie is up-to-date en consistent.

---

## Belangrijke beslissingen

1. **v1 blijft live** tijdens de hele migratie.
2. **Calculatieloket.nl** is de eerste en referentie-implementatie.
3. **Geen big bang**: per cluster migreren.
4. **Documentatie first**: elke fase begint met ontwerp, gevolgd door code.
5. **AI-native**: definities en prompts worden onderdeel van het platform.
