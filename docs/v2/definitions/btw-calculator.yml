      authority_level: official
    status: active
  - id: non_negative_amount
    type: manual_input
    locale: nl-NL
    country: NL
    version: '1.0'
    applies_to: amount
    source:
      label: Calculatieloket.nl — interne validatie
      url: https://calculatieloket.nl/
      authority_level: internal
    status: active
    message:
      nl-NL: Vul een geldig bedrag in (0 of hoger).
