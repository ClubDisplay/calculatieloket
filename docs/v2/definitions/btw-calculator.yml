id: btw-calculator
slug: /btw-calculator/
product: calculatieloket.nl
locale: nl-NL
country: NL
category: btw
subcategory: standaard
priority: A
title:
  nl-NL: BTW Calculator
description:
  nl-NL: Snel btw berekenen over elk bedrag. Geschikt voor het hoge (21%), lage (9%) en nultarief (0%).
status: migrated
route:
  path: /btw-calculator/
  trailing_slash: true
  canonical: https://calculatieloket.nl/btw-calculator/
calculator_module: btw
engine_version: '1.0'
engine_status: migrated
engine_reference: src/lib/calculators/btw.ts
inputs:
  - label:
      nl-NL: Bedrag
    type: money
    prefix: €
    min: 0
    step: 0.01
    default: 100
    placeholder: Bijv. 100
    required: true
    name: amount
    privacy_level: financial_input
  - label:
      nl-NL: BTW-tarief
    type: radio
    options:
      - value: 21
        label:
          nl-NL: 21% — hoog tarief
      - value: 9
        label:
          nl-NL: 9% — laag tarief
      - value: 0
        label:
          nl-NL: 0% — nultarief
    default: 21
    required: true
    name: btwRate
    privacy_level: non_personal
  - label:
      nl-NL: Bereken
    type: radio
    options:
      - value: exclusive_to_inclusive
        label:
          nl-NL: Bedrag is exclusief btw
      - value: inclusive_to_exclusive
        label:
          nl-NL: Bedrag is inclusief btw
    default: exclusive_to_inclusive
    required: true
    name: direction
    privacy_level: non_personal
outputs:
  - label:
      nl-NL: Bedrag exclusief btw
    decimals: 2
    group: result
    name: amountExcl
    type: money
  - label:
      nl-NL: btw-bedrag
    decimals: 2
    group: result
    name: btwAmount
    type: money
  - label:
      nl-NL: Bedrag inclusief btw
    decimals: 2
    group: result
    name: amountIncl
    type: money
rules:
  - id: vat_rates_nl_2026
    type: vat_rate
    locale: nl-NL
    country: NL
    version: '2026'
    applies_to: calculator
    source:
