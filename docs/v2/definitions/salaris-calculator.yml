    prefix: €
    min: 0
    step: 1
    default: 3500
    placeholder: Bijv. 3500
    required: true
    name: grossSalary
    privacy_level: financial_input
  - label:
      nl-NL: Pensioenpremie werknemer
    type: percentage
    suffix: '%'
    min: 0
    max: 30
    step: 0.1
    default: 5
    placeholder: Bijv. 5
